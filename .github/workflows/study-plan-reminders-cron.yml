name: Study plan reminders cron

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders endpoint
        run: |
          curl -sf -X GET "https://www.languageplanprep.co/api/cron/study-plan-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
