<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V1 · Big Player</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--blue:#004AAD;--blue-dark:#06317A;--blue-soft:#E7EFFF;--yellow:#FFCC00;--yellow-soft:#FFF3CC;
    --bg:#F6F3EC;--card:#fff;--ink:#1A1A1A;--sub:#6E6A62;--line:#E9E4D8;--green:#1B9E54;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Prompt',sans-serif;background:#d9d4c7;display:flex;justify-content:center;min-height:100vh;padding:24px 0}
  .phone{width:390px;height:844px;background:var(--bg);border-radius:44px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.28);display:flex;flex-direction:column;border:10px solid #12141c}
  .notch{height:34px;display:flex;align-items:center;justify-content:space-between;padding:10px 26px 0;font-size:13px;font-weight:700;color:var(--ink)}
  .hd{display:flex;align-items:center;gap:10px;padding:8px 16px 6px}
  .back{width:38px;height:38px;border-radius:99px;background:#fff;border:1px solid #e7e3d8;display:flex;align-items:center;justify-content:center;font-size:22px;color:#16203a}
  .hd h1{flex:1;text-align:center;font-size:16px;font-weight:800;color:#16203a}
  .prog{background:#e7f0fc;color:var(--blue);font-size:11px;font-weight:800;padding:6px 11px;border-radius:99px}
  .body{flex:1;display:flex;flex-direction:column;padding:6px 22px 22px}
  .kicker{font-size:12px;font-weight:700;color:var(--blue);text-align:center;margin-top:4px}
  .instruction{font-size:19px;font-weight:800;color:var(--ink);text-align:center;margin-top:4px}

  /* Hero player */
  .player{display:flex;flex-direction:column;align-items:center;margin-top:22px}
  .playhalo{position:relative;width:172px;height:172px;display:flex;align-items:center;justify-content:center}
  .ring{position:absolute;inset:0;border-radius:99px;border:2px solid var(--blue);opacity:.18;animation:pulsering 2.4s ease-out infinite}
  .ring:nth-child(2){animation-delay:1.2s}
  @keyframes pulsering{0%{transform:scale(.72);opacity:.35}100%{transform:scale(1.15);opacity:0}}
  .playbtn{width:128px;height:128px;border-radius:99px;background:var(--blue);border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 18px 34px rgba(0,74,173,.4);animation:breathe 2.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .playbtn .tri{width:0;height:0;border-style:solid;border-width:22px 0 22px 36px;border-color:transparent transparent transparent #fff;margin-left:8px}

  /* Equalizer */
  .eq{display:flex;align-items:flex-end;gap:5px;height:34px;margin-top:20px}
  .eq i{width:5px;background:var(--blue);border-radius:99px;opacity:.85;animation:bounce 1s ease-in-out infinite}
  .eq i:nth-child(1){animation-delay:0s;height:40%}
  .eq i:nth-child(2){animation-delay:.12s;height:70%}
  .eq i:nth-child(3){animation-delay:.24s;height:100%}
  .eq i:nth-child(4){animation-delay:.36s;height:55%}
  .eq i:nth-child(5){animation-delay:.48s;height:85%}
  .eq i:nth-child(6){animation-delay:.6s;height:45%}
  .eq i:nth-child(7){animation-delay:.72s;height:75%}
  .eq i:nth-child(8){animation-delay:.84s;height:50%}
  .eq i:nth-child(9){animation-delay:.96s;height:90%}
  @keyframes bounce{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

  .replay{display:flex;align-items:center;gap:8px;margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:9px 16px;box-shadow:0 4px 12px rgba(0,0,0,.05)}
  .replay .ic{font-size:15px}
  .replay .t{font-size:13px;font-weight:800;color:var(--blue)}
  .hint{font-size:11px;color:var(--sub);margin-top:9px;font-weight:500}
  .hint b{color:var(--ink)}

  .spacer{flex:1}
  .field{position:relative;margin-top:8px}
  .field textarea{width:100%;min-height:88px;border:1.5px solid var(--line);border-radius:20px;background:#fff;padding:15px 16px;font-family:inherit;font-size:16px;color:var(--ink);resize:none}
  .field textarea::placeholder{color:#A39E92}
  .tips{font-size:11px;color:var(--sub);margin:8px 2px 0;text-align:center}
  .submit{margin-top:14px;background:var(--ink);color:#fff;font-weight:900;font-size:16px;padding:16px;border:none;border-radius:99px;width:100%}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"><span>9:41</span><span>●●● 🔋</span></div>
  <div class="hd"><div class="back">‹</div><h1>ตามคำบอก</h1><div class="prog">ด่าน 8 / 200</div></div>
  <div class="body">
    <div class="kicker">🎧 ฟังให้ครบ แล้วค่อยพิมพ์</div>
    <div class="instruction">ฟังแล้วพิมพ์ตามที่ได้ยิน</div>

    <div class="player">
      <div class="playhalo">
        <span class="ring"></span><span class="ring"></span>
        <button class="playbtn"><span class="tri"></span></button>
      </div>
      <div class="eq"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <div class="replay"><span class="ic">🔁</span><span class="t">ฟังอีกครั้ง</span></div>
      <div class="hint">ฟังซ้ำได้ <b>ไม่จำกัด</b> · เล่นไปแล้ว 2 ครั้ง</div>
    </div>

    <div class="spacer"></div>

    <div class="field"><textarea placeholder="พิมพ์สิ่งที่ได้ยิน…"></textarea></div>
    <div class="tips">ไม่ต้องกังวลตัวพิมพ์ใหญ่–เล็ก หรือเครื่องหมายวรรคตอน</div>
    <button class="submit">ส่งคำตอบ</button>
  </div>
</div>
</body>
</html>
